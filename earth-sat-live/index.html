<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth + Live Satellites (TLE/SGP4)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app"></div>

  <aside id="panel">
    <h1>Earth + Live Satellites</h1>
    <div class="row"><span>UTC</span><strong id="utcTime">—</strong></div>
    <div class="row"><span>Satellites</span><strong id="satCount">0</strong></div>

    <div class="controls">
      <label for="speed">Time Scale</label>
      <input id="speed" type="range" min="0" max="10000" step="1" value="60" />
      <div class="row inline">
        <button id="realtimeBtn">Real-time</button>
        <button id="pauseBtn">Pause</button>
        <button id="resumeBtn">Resume</button>
      </div>
      <small id="speedLabel">60×</small>
    </div>

    <section>
      <h2>Layers</h2>
      <label class="check"><input id="showSelectedOrbit" type="checkbox" checked /> Selected orbit path</label>
      <label class="check"><input id="showTrails" type="checkbox" checked /> Satellite trails</label>
      <label class="check"><input id="showAircraft" type="checkbox" checked /> Live aircraft</label>
      <div class="row"><span>Aircraft tracked</span><strong id="aircraftCount">0</strong></div>
    </section>

    <section>
      <h2>Selected Satellite</h2>
      <div id="satInfo" class="mono">Click a satellite…</div>
    </section>

    <section>
      <h2>Selected Aircraft</h2>
      <div id="aircraftInfo" class="mono">Click an aircraft…</div>
    </section>

    <section>
      <h2>Data Source</h2>
      <div class="mono" id="sourceInfo">Loading Celestrak TLE…</div>
      <div class="mono" id="airSourceInfo">Aircraft API idle (layer off).</div>
    </section>
  </aside>

  <div id="tooltip" aria-hidden="true"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
        "satellite.js": "https://esm.sh/satellite.js@5.0.0"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
